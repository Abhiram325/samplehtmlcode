<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Booking Portal</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        color: #fff;
    }

    header {
        text-align: center;
        padding: 20px;
        font-size: 28px;
        font-weight: bold;
        background: rgba(0,0,0,0.3);
    }

    .container {
        max-width: 900px;
        margin: auto;
        margin-top: 30px;
        background: rgba(255,255,255,0.1);
        padding: 20px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
    }

    .tabs {
        display: flex;
        justify-content: space-around;
        margin-bottom: 20px;
    }

    .tab {
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 20px;
        transition: 0.3s;
        background: rgba(255,255,255,0.2);
    }

    .tab:hover, .active {
        background: #ff9800;
        color: #000;
        font-weight: bold;
    }

    .form {
        display: none;
        animation: fadeIn 0.5s;
    }

    .form.active {
        display: block;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        background: #ff9800;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ffc107;
        transform: scale(1.05);
    }

    @keyframes fadeIn {
        from {opacity: 0;}
        to {opacity: 1;}
    }

    footer {
        text-align: center;
        margin-top: 20px;
        font-size: 14px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<header>🎟️ Smart Booking Portal</header>

<div class="container">

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="showForm('movie')">🎬 Movie</div>
        <div class="tab" onclick="showForm('bus')">🚌 Bus</div>
    </div>

    <!-- Movie Booking -->
    <div id="movie" class="form active">
        <h3>Book Movie Ticket</h3>
        <input type="text" placeholder="Enter Movie Name">
        <select>
            <option>Select Theater</option>
            <option>PVR Cinemas</option>
            <option>INOX</option>
        </select>
        <input type="date">
        <select>
            <option>Select Time</option>
            <option>10:00 AM</option>
            <option>2:00 PM</option>
            <option>6:00 PM</option>
        </select>
        <input type="number" placeholder="Number of Seats">
        <button onclick="bookTicket()">Book Movie</button>
    </div>

    <!-- Bus Booking -->
    <div id="bus" class="form">
        <h3>Book Bus Ticket</h3>
        <input type="text" placeholder="From">
        <input type="text" placeholder="To">
        <input type="date">
        <select>
            <option>Select Bus Type</option>
            <option>AC Sleeper</option>
            <option>Non-AC</option>
        </select>
        <input type="number" placeholder="Number of Seats">
        <button onclick="bookTicket()">Book Bus</button>
    </div>

</div>

<footer>© 2026 Smart Booking | DevOps UI Demo</footer>

<script>
function showForm(type) {
    document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

    document.getElementById(type).classList.add('active');
    event.target.classList.add('active');
}

function bookTicket() {
    alert("✅ Booking Successful!");
}
</script>

</body>
</html>
